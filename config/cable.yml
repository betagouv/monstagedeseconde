development:
  adapter: redis
  url: redis://localhost:6379/1

test:
  adapter: test

review:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/1") %>
  <% if ENV.fetch("REDIS_URL", "").start_with?("rediss://") %>
  ssl_params:
    verify_mode: <%= OpenSSL::SSL::VERIFY_NONE %>
  <% end %>

staging:
  adapter: postgresql

production:
  adapter: postgresql
